<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --bg-dark: #0f172a;
            --bg-card: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; background-color: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 450px; padding: 40px 32px; text-align: center; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); }
        .logo-container { margin-bottom: 24px; height: 60px; display: flex; justify-content: center; align-items: center; }
        .logo-img { max-height: 100%; max-width: 180px; object-fit: contain; }
        .icon-wrapper { width: 64px; height: 64px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 24px; background-color: rgba(239, 68, 68, 0.1); color: var(--danger); }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        p { color: var(--text-muted); font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
        .btn { display: inline-block; width: 100%; background-color: var(--primary); color: white; padding: 12px 24px; border-radius: 8px; font-weight: 600; text-decoration: none; transition: background 0.2s; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-container">
            <img src="../images/logo.png" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" alt="Logo">
            <div class="logo-img" style="display:none; color:var(--text-muted); border:2px dashed var(--border); border-radius:8px; width:140px; height:50px; justify-content:center; align-items:center; font-size:12px;">LOGOS SPACE</div>
        </div>

        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </div>

        <h1>Payment Failed</h1>
        <p>We couldn't process your transaction. This might be due to insufficient funds, an incorrect card detail, or terminal rejection.</p>

        <button class="btn" onclick="window.close();">Try Again / Close</button>
    </div>
</body>
</html>
